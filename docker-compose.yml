services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: npk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: npk_db
      POSTGRES_USER: npk_user
      POSTGRES_PASSWORD: npk_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U npk_user -d npk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migration + Seed (runs once then exits)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: npk-migrate
    environment:
      - DATABASE_URL=postgresql://npk_user:npk_secret_2024@postgres:5432/npk_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy --schema=./prisma/schema.prisma && npx tsx prisma/seed.ts"
    restart: "no"

  # Next.js Application (Production)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: npk-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://npk_user:npk_secret_2024@postgres:5432/npk_db?schema=public
      - NEXT_PUBLIC_BASE_URL=https://erp.npk-serviceandsupply.com
      - AUTH_URL=https://erp.npk-serviceandsupply.com
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=s55T4WnE0XHfkljb+Hqvib2M4QR4uETFP/R9vv0QwMo
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
    driver: local
